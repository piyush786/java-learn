<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spring Boot Core Notes</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #07111f;
      --panel: #101b2d;
      --panel-strong: #132238;
      --ink: #f4f7fb;
      --muted: #a8b5c7;
      --line: #27384c;
      --teal: #2dd4bf;
      --teal-ink: #99f6e4;
      --amber: #f59e0b;
      --code: #020617;
      --blue: #93c5fd;
      --shadow: 0 22px 56px rgba(0, 0, 0, 0.34);
      --soft-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(45, 212, 191, 0.16), rgba(245, 158, 11, 0.08) 44%, rgba(147, 197, 253, 0.12)),
        linear-gradient(180deg, #0b1728, var(--page)),
        var(--page);
      color: var(--ink);
    }

    a {
      color: var(--teal-ink);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(100%, 1120px);
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: grid;
      gap: 14px;
      padding: 18px;
      margin: 0 0 14px;
      border: 1px solid rgba(216, 224, 234, 0.34);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(16, 27, 45, 0.96), rgba(16, 45, 52, 0.78)),
        var(--panel);
      box-shadow: var(--soft-shadow);
    }

    .brand {
      display: grid;
      gap: 6px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 4vw, 2.15rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      max-width: 72ch;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .searchBox {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--code);
      color: var(--ink);
      padding: 12px 14px;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .searchBox:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.14);
    }

    .statusRow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.7);
      color: var(--ink);
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .rawLink {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border: 1px solid rgba(45, 212, 191, 0.35);
      border-radius: 8px;
      background: rgba(45, 212, 191, 0.1);
      color: var(--teal-ink);
      padding: 7px 10px;
      text-decoration: none;
      font-weight: 800;
    }

    .layout {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .toc {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 27, 45, 0.94);
      box-shadow: var(--soft-shadow);
      padding: 14px;
      min-width: 0;
      overflow: hidden;
    }

    .toc h2 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      letter-spacing: 0;
    }

    .tocList {
      display: flex;
      gap: 8px;
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-color: var(--line) transparent;
    }

    .tocList a {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--code);
      color: var(--ink);
      padding: 7px 11px;
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 750;
    }

    .tocList a:hover,
    .tocList a:focus-visible {
      border-color: var(--teal);
      color: var(--teal-ink);
    }

    .notesPanel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 27, 45, 0.97);
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }

    .referenceContent {
      padding: 18px;
    }

    .referenceContent h1,
    .referenceContent h2,
    .referenceContent h3,
    .referenceContent h4 {
      letter-spacing: 0;
      scroll-margin-top: 16px;
    }

    .referenceContent h1 {
      margin: 0 0 16px;
      font-size: clamp(1.35rem, 4vw, 2rem);
    }

    .referenceContent h2 {
      margin: 30px 0 10px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: clamp(1.15rem, 3vw, 1.5rem);
      color: var(--teal-ink);
    }

    .referenceContent h3 {
      margin: 22px 0 8px;
      color: var(--blue);
      font-size: 1.05rem;
    }

    .referenceContent h4 {
      margin: 18px 0 8px;
      color: var(--ink);
      font-size: 0.98rem;
    }

    .referenceContent p,
    .referenceContent li {
      color: #d7e0ec;
      line-height: 1.68;
    }

    .referenceContent p {
      margin: 10px 0;
    }

    .referenceContent ul,
    .referenceContent ol {
      padding-left: 22px;
      margin: 10px 0 14px;
    }

    .referenceContent code {
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 6px;
      background: rgba(2, 6, 23, 0.82);
      color: #f8fafc;
      padding: 0.13rem 0.35rem;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .referenceContent pre {
      position: relative;
      margin: 14px 0;
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 8px;
      background: var(--code);
      overflow-x: auto;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .referenceContent pre::before {
      content: attr(data-language);
      position: absolute;
      top: 8px;
      right: 10px;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
    }

    .referenceContent pre code {
      display: block;
      min-width: max-content;
      border: 0;
      background: transparent;
      padding: 16px;
      line-height: 1.55;
      white-space: pre;
    }

    .referenceContent table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: block;
      overflow-x: auto;
    }

    .referenceContent th,
    .referenceContent td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
      min-width: 180px;
    }

    .referenceContent th {
      background: var(--panel-strong);
      color: var(--ink);
    }

    .referenceContent td {
      color: #d7e0ec;
    }

    .emptyState {
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.34);
      padding: 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    .hidden {
      display: none;
    }

    mark {
      border-radius: 4px;
      background: rgba(245, 158, 11, 0.3);
      color: #fff7ed;
      padding: 0 2px;
    }

    @media (min-width: 840px) {
      .shell {
        padding: 24px;
      }

      .topbar {
        padding: 22px;
      }

      .toolbar {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .layout {
        grid-template-columns: 280px minmax(0, 1fr);
        align-items: start;
      }

      .toc {
        position: sticky;
        top: 18px;
      }

      .tocList {
        display: grid;
        overflow: visible;
      }

      .tocList a {
        border-radius: 8px;
        white-space: normal;
      }

      .referenceContent {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Spring Boot Core Notes</h1>
        <p class="subtitle">Chapter 1 covers core Spring Boot annotations and runtime features. Chapter 2 keeps the older microservices patterns notes.</p>
      </div>

      <div class="toolbar">
        <input
          id="referenceSearch"
          class="searchBox"
          type="search"
          placeholder="Search notes, code, properties, annotations..."
          autocomplete="off"
        >
        <div class="statusRow">
          <span id="notesStatus" class="pill">Loading notes</span>
          <a class="rawLink" href="spring-boot-core-notes.md">Chapter 1 Markdown</a>
          <a class="rawLink" href="spring-boot-microservices-patterns.md">Chapter 2 Markdown</a>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="toc" aria-label="Table of contents">
        <h2>Topics</h2>
        <nav id="tocList" class="tocList">
          <span class="pill">Loading</span>
        </nav>
      </aside>

      <article class="notesPanel">
        <div id="referenceContent" class="referenceContent">
          <div class="emptyState">Loading reference notes...</div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const dom = {
      referenceSearch: document.getElementById("referenceSearch"),
      referenceContent: document.getElementById("referenceContent"),
      notesStatus: document.getElementById("notesStatus"),
      tocList: document.getElementById("tocList")
    };

    let referenceMarkdown = "";
    let currentSections = [];

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function slugify(value) {
      return value
        .toLowerCase()
        .replace(/`/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "section";
    }

    function renderInlineMarkdown(value) {
      return escapeHtml(value)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    function highlightText(html, query) {
      if (!query) return html;
      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const matcher = new RegExp(`(${escapedQuery})`, "gi");
      return html.replace(/>([^<]+)</g, (part, text) => {
        return `>${text.replace(matcher, "<mark>$1</mark>")}<`;
      });
    }

    function splitSections(markdown) {
      const normalized = markdown.replace(/\r\n/g, "\n");
      const parts = normalized.split(/\n(?=#{1,2}\s+)/);
      const intro = parts[0] && !/^#{1,2}\s+/.test(parts[0]) ? parts[0] : "";
      const sections = parts.filter(part => /^#{1,2}\s+/.test(part));
      return { intro, sections };
    }

    function sectionTitle(section) {
      const match = section.match(/^#{1,2}\s+(.+)$/m);
      return match ? match[1].trim() : "Notes";
    }

    function filterMarkdownSections(markdown, query) {
      if (!query) return markdown;
      const { intro, sections } = splitSections(markdown);
      const visibleSections = sections.filter(section => section.toLowerCase().includes(query.toLowerCase()));
      return [intro, ...visibleSections].filter(Boolean).join("\n");
    }

    function collectSections(markdown) {
      return splitSections(markdown).sections.map(section => {
        const title = sectionTitle(section);
        return { title, id: slugify(title) };
      });
    }

    function renderToc(sections) {
      if (!sections.length) {
        dom.tocList.innerHTML = '<span class="pill">No sections</span>';
        return;
      }
      dom.tocList.innerHTML = sections
        .map(section => `<a href="#${section.id}">${escapeHtml(section.title)}</a>`)
        .join("");
    }

    function renderMarkdown(markdown, query = "") {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      const usedIds = new Map();
      let index = 0;

      function uniqueHeadingId(title) {
        const base = slugify(title);
        const count = usedIds.get(base) || 0;
        usedIds.set(base, count + 1);
        return count ? `${base}-${count + 1}` : base;
      }

      while (index < lines.length) {
        const line = lines[index];

        if (!line.trim() || line.trim() === "---") {
          index += 1;
          continue;
        }

        const fence = line.match(/^```(\w+)?/);
        if (fence) {
          const language = fence[1] || "code";
          const code = [];
          index += 1;
          while (index < lines.length && !lines[index].startsWith("```")) {
            code.push(lines[index]);
            index += 1;
          }
          index += 1;
          html.push(`<pre data-language="${escapeHtml(language)}"><code>${escapeHtml(code.join("\n"))}</code></pre>`);
          continue;
        }

        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          const level = heading[1].length;
          const title = heading[2].trim();
          const id = level <= 2 ? uniqueHeadingId(title) : "";
          const idAttr = id ? ` id="${id}"` : "";
          html.push(`<h${level}${idAttr}>${renderInlineMarkdown(title)}</h${level}>`);
          index += 1;
          continue;
        }

        if (line.startsWith("|") && lines[index + 1] && /^\|[\s:-|]+\|?$/.test(lines[index + 1])) {
          const tableLines = [];
          while (index < lines.length && lines[index].startsWith("|")) {
            tableLines.push(lines[index]);
            index += 1;
          }
          const rows = tableLines
            .filter((row, rowIndex) => rowIndex !== 1)
            .map(row => row.replace(/^\||\|$/g, "").split("|").map(cell => cell.trim()));
          const head = rows.shift() || [];
          const bodyRows = rows.map(row => `<tr>${row.map(cell => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>`).join("");
          html.push(`<table><thead><tr>${head.map(cell => `<th>${renderInlineMarkdown(cell)}</th>`).join("")}</tr></thead><tbody>${bodyRows}</tbody></table>`);
          continue;
        }

        if (/^\s*-\s+/.test(line)) {
          const items = [];
          while (index < lines.length && /^\s*-\s+/.test(lines[index])) {
            items.push(lines[index].replace(/^\s*-\s+/, ""));
            index += 1;
          }
          html.push(`<ul>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
          continue;
        }

        if (/^\s*\d+\.\s+/.test(line)) {
          const items = [];
          while (index < lines.length && /^\s*\d+\.\s+/.test(lines[index])) {
            items.push(lines[index].replace(/^\s*\d+\.\s+/, ""));
            index += 1;
          }
          html.push(`<ol>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ol>`);
          continue;
        }

        const paragraph = [line.trim()];
        index += 1;
        while (
          index < lines.length &&
          lines[index].trim() &&
          !/^(#{1,4})\s+/.test(lines[index]) &&
          !lines[index].startsWith("```") &&
          !lines[index].startsWith("|") &&
          !/^\s*[-\d]+[.)]?\s+/.test(lines[index])
        ) {
          paragraph.push(lines[index].trim());
          index += 1;
        }
        html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
      }

      return highlightText(html.join("\n"), query);
    }

    function renderReference() {
      const query = dom.referenceSearch.value.trim();
      const visibleMarkdown = filterMarkdownSections(referenceMarkdown, query);

      if (!visibleMarkdown.trim()) {
        dom.referenceContent.innerHTML = '<div class="emptyState">No matching notes found.</div>';
        dom.notesStatus.textContent = "0 matches";
        renderToc([]);
        return;
      }

      currentSections = collectSections(visibleMarkdown);
      dom.referenceContent.innerHTML = renderMarkdown(visibleMarkdown, query);
      dom.notesStatus.textContent = query ? `${currentSections.length} matching sections` : `${currentSections.length} sections`;
      renderToc(currentSections);
    }

    async function loadReferenceMarkdown() {
      try {
        const [chapterOneResponse, chapterTwoResponse] = await Promise.all([
          fetch("spring-boot-core-notes.md", { cache: "no-store" }),
          fetch("spring-boot-microservices-patterns.md", { cache: "no-store" })
        ]);

        if (!chapterOneResponse.ok) throw new Error(`Chapter 1 HTTP ${chapterOneResponse.status}`);
        if (!chapterTwoResponse.ok) throw new Error(`Chapter 2 HTTP ${chapterTwoResponse.status}`);

        const chapterOneMarkdown = await chapterOneResponse.text();
        const chapterTwoMarkdown = await chapterTwoResponse.text();
        referenceMarkdown = `${chapterOneMarkdown}\n\n---\n\n# Chapter 2: Old Notes\n\n${chapterTwoMarkdown}`;
        renderReference();
      } catch (error) {
        dom.notesStatus.textContent = "Load failed";
        dom.referenceContent.innerHTML = '<div class="emptyState">Could not load the Markdown files. Try opening <a href="spring-boot-core-notes.md">Chapter 1 Markdown</a> or <a href="spring-boot-microservices-patterns.md">Chapter 2 Markdown</a>.</div>';
        dom.tocList.innerHTML = '<span class="pill">Unavailable</span>';
      }
    }

    dom.referenceSearch.addEventListener("input", renderReference);
    loadReferenceMarkdown();
  </script>
</body>
</html>
